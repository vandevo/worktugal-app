<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAF9;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Suppressing Shared Nav Components for Transactional Screen -->
<main class="flex-grow flex flex-col px-6 py-12 max-w-md mx-auto w-full">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-primary-container text-2xl" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
<h1 class="text-primary font-black tracking-tighter text-[24px]">Worktugal</h1>
</div>
<!-- Header -->
<div class="text-center mb-10">
<h2 class="text-on-surface font-bold text-[28px] tracking-tight leading-tight mb-3">Welcome back</h2>
<p class="text-secondary text-[14px] leading-relaxed max-w-[280px] mx-auto">
                Sign in to access your compliance history and saved results.
            </p>
</div>
<!-- Social Auth -->
<div class="space-y-3 mb-8">
<button class="w-full h-14 rounded-xl border border-outline bg-surface-container-lowest flex items-center justify-center gap-3 active:scale-[0.98] transition-all duration-200">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google colorful company logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDtrUNCipVNYl3W9HCQog4pfMmKoTJeXGXm8yPiINyenG5rw1Uxmfv5a2PZthk8SrDMIqVM9KeALOEj8tDNi4iT9nDCY4RArP6q3Fh2R_s1TL8dMYp6TncNpCcVSA5EQl3ujpvADnOeRic4ew3wunEnC91nf5w1m52V01u_9ByF3RTLi1OlFaEuseNdF2tEYGDbMN-9xC4kETZaWQLCDorsiWo7430B8R93c4XgbyFdENnXX9Ugi9KrI_xr9-BM6mOhhbv4UouA8O3g"/>
<span class="text-[15px] font-semibold text-on-surface">Continue with Google</span>
</button>
<button class="w-full h-14 rounded-xl border border-outline bg-surface-container-lowest flex items-center justify-center gap-3 active:scale-[0.98] transition-all duration-200">
<span class="material-symbols-outlined text-on-surface text-xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-[15px] font-semibold text-on-surface">Continue with Apple</span>
</button>
</div>
<!-- Divider -->
<div class="relative mb-8 flex items-center">
<div class="flex-grow border-t border-outline"></div>
<span class="px-4 text-[11px] font-bold uppercase tracking-[0.15em] text-on-surface-variant bg-surface">or</span>
<div class="flex-grow border-t border-outline"></div>
</div>
<!-- Form -->
<form class="space-y-4">
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-[0.15em] text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-low border-transparent focus:border-primary-container focus:ring-0 text-[15px] placeholder:text-on-surface-variant/50 transition-colors" placeholder="your@email.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-[0.15em] text-on-surface-variant ml-1">Password</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-low border-transparent focus:border-primary-container focus:ring-0 text-[15px] placeholder:text-on-surface-variant/50 transition-colors" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full h-14 bg-primary-container text-on-primary font-bold rounded-xl shadow-sm hover:opacity-90 active:scale-95 transition-all duration-200 text-[16px]" type="submit">
                    Sign in
                </button>
</div>
</form>
<!-- Forgot Password -->
<div class="mt-6 text-center">
<a class="text-[13px] font-medium text-secondary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign Up Link -->
<div class="mt-auto pt-12 text-center pb-6">
<p class="text-[14px] text-secondary">
                Don't have an account? 
                <a class="text-primary-container font-bold ml-1 hover:underline underline-offset-4" href="#">Sign up</a>
</p>
</div>
</main>
<!-- Visual Accent Element (Sovereign Compliance Bar) -->
<div class="fixed left-0 top-1/2 -translate-y-1/2 w-1 h-32 bg-primary-container rounded-r-full opacity-20 md:hidden"></div>
</body></html>
