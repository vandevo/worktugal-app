<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f3e2e",
                        "emerald-accent": "#10B981",
                        "background-light": "#FAFAF9",
                        "background-dark": "#131f1b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .watermark-text {
            font-weight: 100;
            color: rgba(0, 0, 0, 0.04);
            font-size: 120px;
            line-height: 1;
            user-select: none;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-start text-primary dark:text-emerald-accent">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-primary dark:text-emerald-accent text-xl font-bold tracking-tight">Worktugal</h1>
<button class="w-10 h-10 flex items-center justify-end text-slate-400">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</header>
<!-- Progress Indicator -->
<div class="px-6 py-2">
<div class="flex justify-between items-end mb-2">
<span class="text-xs font-semibold uppercase tracking-wider text-primary/60 dark:text-emerald-accent/60">Progress</span>
<span class="text-xs font-bold text-primary dark:text-emerald-accent">3 of 13</span>
</div>
<div class="w-full h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-emerald-accent w-[23%] rounded-full"></div>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 px-6 pt-8 pb-32 relative overflow-hidden">
<!-- Background Watermark -->
<div class="absolute top-4 left-4 watermark-text">03</div>
<div class="relative z-10">
<h2 class="text-2xl font-bold leading-tight text-slate-900 dark:text-white mb-2">
                Do you have a Portuguese NIF (tax number)?
            </h2>
<p class="text-slate-500 dark:text-slate-400 font-light text-sm mb-8">
                This is required for most tax obligations and banking in Portugal.
            </p>
<!-- Option List -->
<div class="space-y-4">
<!-- Selected Option -->
<button class="w-full flex items-center justify-between p-4 bg-white dark:bg-slate-900 rounded-xl border-l-4 border-emerald-accent shadow-sm ring-1 ring-slate-200 dark:ring-slate-800 text-left min-h-[64px]">
<span class="font-medium text-slate-900 dark:text-white">Yes, I have an active NIF</span>
<span class="material-symbols-outlined text-emerald-accent fill-1">check_circle</span>
</button>
<!-- Default Option -->
<button class="w-full flex items-center justify-between p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-emerald-accent/50 transition-colors text-left min-h-[64px]">
<span class="font-medium text-slate-700 dark:text-slate-300">In progress — I've applied</span>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
<!-- Default Option -->
<button class="w-full flex items-center justify-between p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-emerald-accent/50 transition-colors text-left min-h-[64px]">
<span class="font-medium text-slate-700 dark:text-slate-300">No, I don't have one yet</span>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
<!-- Default Option -->
<button class="w-full flex items-center justify-between p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-emerald-accent/50 transition-colors text-left min-h-[64px]">
<span class="font-medium text-slate-700 dark:text-slate-300">I'm not sure</span>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</button>
</div>
</div>
</main>
<!-- Sticky Footer -->
<footer class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light/95 to-transparent dark:from-background-dark dark:via-background-dark/95">
<div class="max-w-md mx-auto flex flex-col items-center gap-4">
<button class="w-full h-14 bg-emerald-accent hover:bg-emerald-600 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-lg shadow-emerald-500/20">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="text-sm font-medium text-slate-400 hover:text-primary dark:hover:text-emerald-accent transition-colors">
                Skip this question
            </button>
</div>
</footer>
</body></html>
