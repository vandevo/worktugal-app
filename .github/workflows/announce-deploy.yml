name: Announce Deploy

on:
  push:
    branches:
      - main

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "sha=$(git log -1 --pretty=%h)" >> $GITHUB_OUTPUT

      - name: Post to Worktugal channel
        run: |
          MESSAGE="🚀 <b>New update live</b> — <a href=\"https://app.worktugal.com\">app.worktugal.com</a>

${{ steps.commit.outputs.message }}

<i>Deployed from commit ${{ steps.commit.outputs.sha }}</i>"

          curl -s -X POST \
            "${{ secrets.SUPABASE_FUNCTION_URL }}/post-to-channel" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .), \"source\": \"deploy\", \"parse_mode\": \"HTML\"}"
