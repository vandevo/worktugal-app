name: Announce Deploy

on:
  push:
    branches:
      - main

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post to Worktugal channel
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%h)

          MESSAGE="🚀 <b>New update live</b> — <a href=\"https://app.worktugal.com\">app.worktugal.com</a>

${COMMIT_MSG}

<i>Commit: ${COMMIT_SHA}</i>"

          curl -s -X POST \
            "${SUPABASE_FUNCTION_URL}/post-to-channel" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .), \"source\": \"deploy\", \"parse_mode\": \"HTML\"}"
